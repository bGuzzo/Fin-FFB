# ==============================================================================
# Fin-FFB Extra Large (Ultra-Fat) Configuration
# ------------------------------------------------------------------------------
# Optimized for: Multi-GPU setups or flagship GPUs (24GB+ VRAM, e.g., H100/A100).
# Targeted Size: ~204 Million parameters.
# ==============================================================================

model:
  # Model Dimensions
  vocab_size: 30000
  d_model: 2048            # Ultra-wide for maximum feature extraction.
  num_layers: 2            # Extremely shallow for low-latency inference.
  num_heads: 32            # d_head = 64.
  dropout: 0.1
  ffn_factor: 4            # d_ffn = 8192.
  
  # Initialization & Normalization
  initializer_range: 0.02

training:
  # Hardware & Efficiency
  batch_size: 16           # Very high VRAM usage.
  gradient_accumulation_steps: 16 # Effective batch size = 256.
  mixed_precision: "bf16"
  
  # Optimization
  learning_rate: 1.5e-4    # Lower LR for massive width to prevent divergence.
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1.0e-6
  clip_grad_norm: 1.0
  
  # Scheduler
  warmup_steps: 3000       # Longer warmup for stability.

dataset:
  # MLM Configuration
  max_seq_len: 512
  mask_probability: 0.15
