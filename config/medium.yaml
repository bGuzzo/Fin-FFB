# ==============================================================================
# Fin-FFB Medium Configuration
# ------------------------------------------------------------------------------
# Optimized for: Mid-range Consumer GPUs (12GB VRAM, e.g., RTX 3060 12GB).
# ==============================================================================

model:
  # Model Dimensions
  vocab_size: 30000
  d_model: 768             # Moderate width for balanced performance.
  num_layers: 3            # Fast/Shallow architecture.
  num_heads: 12            # d_head = 64.
  dropout: 0.1
  ffn_factor: 4            # d_ffn = 3072.
  
  # Initialization & Normalization
  initializer_range: 0.02
  norm_eps: 1.0e-5

training:
  # Hardware & Efficiency
  batch_size: 48           # Adjusted for 768 width.
  gradient_accumulation_steps: 4 # Effective batch size = 192.
  mixed_precision: "bf16"
  
  # Optimization
  learning_rate: 4.0e-4    # Increased for smaller width.
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1.0e-6
  clip_grad_norm: 1.0
  
  # Scheduler
  lr_scheduler_type: "cosine"
  warmup_steps: 2000

dataset:
  # MLM Configuration
  max_seq_len: 512
  mask_probability: 0.15
  label_smoothing: 0.1
