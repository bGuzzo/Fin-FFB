# ==============================================================================
# Fin-FFB Medium Configuration
# ------------------------------------------------------------------------------
# Optimized for: Mid-range Consumer GPUs (12GB VRAM, e.g., RTX 3060 12GB).
# ==============================================================================

model:
  # Model Dimensions
  vocab_size: 30000
  d_model: 1024            # Large width for better feature extraction.
  num_layers: 3            # Max depth for Medium variant.
  num_heads: 16            # d_head = 64.
  dropout: 0.1
  ffn_factor: 4            # d_ffn = 4096.
  
  # Initialization & Normalization
  initializer_range: 0.02
  norm_eps: 1.0e-5

training:
  # Hardware & Efficiency
  batch_size: 32
  gradient_accumulation_steps: 4 # Effective batch size = 128. Reduces VRAM pressure.
  mixed_precision: "bf16"
  
  # Optimization
  learning_rate: 3.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1.0e-6
  clip_grad_norm: 1.0
  
  # Scheduler
  lr_scheduler_type: "cosine"
  warmup_steps: 2000

dataset:
  # MLM Configuration
  max_seq_len: 512
  mask_probability: 0.15
  label_smoothing: 0.1
