# ==============================================================================
# Fin-FFB Nano Configuration
# ------------------------------------------------------------------------------
# Optimized for: Ultra-fast prototyping, CPU training, or very low-end GPUs.
# ==============================================================================

model:
  # Model Dimensions
  vocab_size: 30000        # Standard for albert-base-v2 tokenizer.
  d_model: 256             # Hidden dimension size (Wide/Fat focus).
  num_layers: 1            # Number of AttnRes blocks (Fast/Shallow focus).
  num_heads: 4             # Number of attention heads (d_head = 64).
  dropout: 0.1             # Unified dropout with other variants.
  ffn_factor: 4            # Multiplier for the hidden layer in FFN (d_ffn = 1024).
  
  # Initialization & Normalization
  initializer_range: 0.02  # StdDev for weight initialization (standard for BERT).
  norm_eps: 1.0e-5         # Epsilon for RMSNorm to avoid division by zero.

training:
  # Hardware & Efficiency
  batch_size: 16          # Number of samples processed per GPU step.
  gradient_accumulation_steps: 8 # Effective batch size = 128 (consistent with others).
  mixed_precision: "fp16"  # Use Float16 to save VRAM and speed up training on Apple Silicon.
  
  # Optimization (AdamW)
  learning_rate: 1.0e-3    # Higher LR for small models.
  weight_decay: 0.01       # L2 regularization.
  betas: [0.9, 0.98]       # AdamW momentum parameters.
  eps: 1.0e-6              # Numerical stability.
  clip_grad_norm: 1.0      # Gradient clipping.
  
  # Scheduler
  lr_scheduler_type: "cosine" # Gradual LR decay.
  warmup_steps: 500        # Linear increase of LR at the start.

dataset:
  # MLM Configuration
  max_seq_len: 512         # Training window.
  mask_probability: 0.15   # Percentage of tokens to mask.
  label_smoothing: 0.1     # Prevents overconfidence.
