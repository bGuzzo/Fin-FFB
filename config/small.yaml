# ==============================================================================
# Fin-FFB Small Configuration
# ------------------------------------------------------------------------------
# Optimized for: Consumer GPUs with 6GB-8GB VRAM (e.g., RTX 3060/4060).
# ==============================================================================

model:
  # Model Dimensions
  vocab_size: 30000
  d_model: 512             # Standard "Small" BERT width.
  num_layers: 2            # Keeping it shallow for speed.
  num_heads: 8             # d_head = 64.
  dropout: 0.1
  ffn_factor: 4            # d_ffn = 2048.
  
  # Initialization & Normalization
  initializer_range: 0.02
  norm_eps: 1.0e-5

training:
  # Hardware & Efficiency
  batch_size: 64
  gradient_accumulation_steps: 2 # Effective batch size = 128. Helps on 8GB VRAM.
  mixed_precision: "bf16"  # BFloat16 is preferred if hardware supports it (RTX 30+).
  
  # Optimization
  learning_rate: 5.0e-4
  weight_decay: 0.01
  betas: [0.9, 0.98]
  eps: 1.0e-6
  clip_grad_norm: 1.0
  
  # Scheduler
  lr_scheduler_type: "cosine"
  warmup_steps: 1000       # More steps for a larger model.

dataset:
  # MLM Configuration
  max_seq_len: 512
  mask_probability: 0.15
  label_smoothing: 0.1
